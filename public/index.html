<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <!-- Thẻ meta quan trọng để giao diện hiển thị chuẩn tỷ lệ trên màn hình điện thoại -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CryptoBot Controller Pro</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --primary: #4facfe;
            --danger: #ff4b2b;
            --text-main: #ffffff;
            --text-muted: #e0e0e0;
        }

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; 
            padding: 15px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px; /* Tối ưu cho cả Mobile và PC */
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            box-shadow: var(--glass-shadow);
        }

        h2, h3 { margin-top: 0; font-weight: 600; letter-spacing: 0.5px; }
        
        .status-text { color: #ffd700; font-weight: bold; }
        .log-box { 
            background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; 
            font-size: 0.9em; min-height: 20px; word-wrap: break-word;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Lưới Nút bấm tự động co giãn */
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px;
        }

        button {
            background: rgba(255, 255, 255, 0.2); 
            border: 1px solid rgba(255,255,255,0.3); 
            padding: 12px 15px;
            border-radius: 12px; 
            color: white; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 14px;
            transition: all 0.2s ease;
            backdrop-filter: blur(5px);
        }
        button:hover, button:active { background: rgba(255, 255, 255, 0.4); transform: scale(0.98); }
        .btn-danger { background: rgba(255, 75, 43, 0.5); border-color: rgba(255, 75, 43, 0.8); }
        .btn-danger:hover { background: rgba(255, 75, 43, 0.7); }

        /* Hàng cấu hình cài đặt */
        .settings-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            background: rgba(0,0,0,0.15);
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        input[type="number"] {
            width: 50px; padding: 8px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.1);
            color: white; font-weight: bold; text-align: center;
            outline: none;
        }
        input[type="number"]:focus { border-color: #4facfe; }

        /* Nút Switch Bật/Tắt Auto kiểu iOS */
        .switch { position: relative; display: inline-block; width: 46px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255,255,255,0.3); transition: .4s; border-radius: 24px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #4cd964; }
        input:checked + .slider:before { transform: translateX(22px); }

        /* Danh sách thiết bị */
        ul { list-style: none; padding: 0; margin: 0; }
        li {
            background: rgba(0,0,0,0.2); padding: 12px; border-radius: 10px; margin-bottom: 8px;
            font-size: 13px; display: flex; align-items: center; gap: 8px;
            border-left: 4px solid #4facfe;
        }
        .status-badge {
            padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: bold;
        }
        .badge-idle { background: #4cd964; color: #000; }
        .badge-working { background: #ffcc00; color: #000; }

        .popup {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #28a745; padding: 30px; border-radius: 15px; font-size: 20px; font-weight: bold;
            text-align: center; z-index: 1000; box-shadow: 0 10px 40px rgba(0,0,0,0.5); width: 80%; max-width: 300px;
        }

        /* Responsive Mobile Nhỏ */
        @media (max-width: 400px) {
            .btn-grid { grid-template-columns: 1fr; } /* Nút dàn thành cột dọc */
            .settings-row { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- PANEL TRẠNG THÁI -->
    <div class="glass-panel">
        <h2>📊 Trạng thái: <span class="status-text">Chungdacoeim</span></h2>
        <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
            <span>Số dư: <strong id="balance" style="font-size: 18px; color: #4cd964;">0đ</strong></span>
            <span>NV: <strong id="tasks">0/0</strong></span>
        </div>
        <div class="log-box" id="progress">⚡ Chờ lệnh...</div>
    </div>

    <!-- PANEL ĐIỀU KHIỂN -->
    <div class="glass-panel">
        <h3>🎮 Bảng điều khiển</h3>
        <div class="btn-grid">
            <button onclick="sendCommand('/uptolink2step')">UpToLink 2 Step</button>
            <button onclick="sendCommand('/uptolink3step')">UpToLink 3 Step</button>
            <button onclick="sendCommand('/spin')">Lượt quay (Spin)</button>
            <button onclick="sendCommand('/top')">Thứ hạng (Top)</button>
            <button class="btn-danger" onclick="sendCommand('/withdraw')">💳 Rút tiền (Withdraw)</button>
        </div>

        <div class="settings-row">
            <div class="input-group">
                <label><strong>Auto-PPLink:</strong></label>
                <label class="switch">
                    <input type="checkbox" id="autoPpLink" onchange="toggleAuto(this)">
                    <span class="slider"></span>
                </label>
            </div>
            
            <div class="input-group">
                <label>Mục tiêu NV:</label>
                <input type="number" id="targetTasks" value="50" onchange="saveSettings()">
            </div>

            <div class="input-group">
                <label>Delay (giây):</label>
                <input type="number" id="delayInput" value="5" onchange="updateDelay(this)">
            </div>
        </div>
    </div>

    <!-- PANEL THIẾT BỊ -->
    <div class="glass-panel">
        <h3>🌐 Thiết bị Extension đang kết nối: <span id="devCount" class="status-text">0</span></h3>
        <ul id="deviceList">
            <li style="border-left-color: gray;">Chưa có thiết bị nào kết nối...</li>
        </ul>
    </div>
</div>

<!-- THÔNG BÁO RÚT TIỀN -->
<div id="withdrawPopup" class="popup">
    🎉 Tiền về, Tiền về! 🎉<br><br>
    <button onclick="document.getElementById('withdrawPopup').style.display='none'" style="width: 100%; margin-top: 15px;">Tuyệt vời</button>
</div>

<script>
    const socket = io();

    // Lắng nghe cập nhật số dư từ Bot
    socket.on('UPDATE_STATS', (data) => {
        document.getElementById('balance').innerText = data.balance + 'đ';
        document.getElementById('tasks').innerText = data.tasks;
    });

    // Lắng nghe danh sách Extension đang online
    socket.on('UPDATE_DEVICES', (devices) => {
        document.getElementById('devCount').innerText = devices.length;
        const list = document.getElementById('deviceList');
        if (devices.length === 0) {
            list.innerHTML = `<li style="border-left-color: gray;">Chưa có thiết bị nào kết nối...</li>`;
        } else {
            list.innerHTML = devices.map(d => {
                const badge = d.status === 'idle' ? `<span class="status-badge badge-idle">Rảnh</span>` : `<span class="status-badge badge-working">Bận</span>`;
                return `<li>${badge} <span>IP: <strong>${d.ip}</strong> (${d.country})</span></li>`;
            }).join('');
        }
    });

    socket.on('WITHDRAW_SUCCESS', () => {
        document.getElementById('withdrawPopup').style.display = 'block';
    });

    socket.on('UPDATE_LOG', (msg) => {
        document.getElementById('progress').innerText = msg;
    });

    // Hàm gửi lệnh tích hợp vòng lặp Mục tiêu nhiệm vụ
    function sendCommand(cmd) { 
        const target = document.getElementById('targetTasks').value;
        // Gửi lệnh theo chuẩn Object cấu trúc mới của file server.js
        socket.emit('SEND_COMMAND', { command: cmd, target: parseInt(target) || 999999 }); 
    }

    function toggleAuto(cb) { 
        socket.emit('TOGGLE_AUTOPPLINK', cb.checked); 
        saveSettings();
    }

    function updateDelay(input) { 
        socket.emit('SET_DELAY', parseInt(input.value) * 1000); 
        saveSettings();
    }

    // LƯU CẤU HÌNH XUỐNG BỘ NHỚ TRÌNH DUYỆT
    function saveSettings() {
        localStorage.setItem('autoPpLink', document.getElementById('autoPpLink').checked);
        localStorage.setItem('delayInput', document.getElementById('delayInput').value);
        localStorage.setItem('targetTasks', document.getElementById('targetTasks').value);
    }

    // TẢI LẠI CẤU HÌNH KHI F5 TRANG
    window.onload = () => {
        const savedAuto = localStorage.getItem('autoPpLink') === 'true';
        const savedDelay = localStorage.getItem('delayInput') || 5;
        const savedTarget = localStorage.getItem('targetTasks') || 50;

        document.getElementById('autoPpLink').checked = savedAuto;
        document.getElementById('delayInput').value = savedDelay;
        document.getElementById('targetTasks').value = savedTarget;

        // Báo cấu hình cho server
        toggleAuto({ checked: savedAuto });
        updateDelay({ value: savedDelay });
    }
</script>
</body>
</html>
