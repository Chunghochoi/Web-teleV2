<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CryptoBot Controller Max</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* ... (Giữ nguyên style cũ của bạn ở đây, thêm class cho rank) ... */
        :root { --glass-bg: rgba(255, 255, 255, 0.1); --glass-border: rgba(255, 255, 255, 0.2); --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); --text-main: #ffffff; }
        body { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: var(--text-main); font-family: sans-serif; margin: 0; padding: 15px; min-height: 100vh; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 20px; }
        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; box-shadow: var(--glass-shadow); }
        h2, h3 { margin-top: 0; font-weight: 600; }
        .status-text { color: #ffd700; font-weight: bold; }
        .log-box { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; font-size: 0.9em; min-height: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .btn-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; }
        button { background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255,255,255,0.3); padding: 12px 15px; border-radius: 12px; color: white; cursor: pointer; font-weight: bold; font-size: 14px; }
        button:hover { background: rgba(255, 255, 255, 0.4); }
        .settings-row { display: flex; flex-wrap: wrap; gap: 15px; background: rgba(0,0,0,0.15); padding: 15px; border-radius: 12px; margin-top: 15px; align-items: center;}
        .input-group { display: flex; align-items: center; gap: 8px; font-size: 14px; }
        input[type="number"] { width: 50px; padding: 8px; border-radius: 8px; background: rgba(255,255,255,0.1); color: white; font-weight: bold; text-align: center; border: 1px solid rgba(255,255,255,0.4); }
        ul { list-style: none; padding: 0; margin: 0; }
        li { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 10px; margin-bottom: 8px; font-size: 13px; display: flex; align-items: center; gap: 8px; border-left: 4px solid #4facfe; }
        .badge-idle { background: #4cd964; color: #000; padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: bold;}
        .badge-working { background: #ffcc00; color: #000; padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: bold;}
    </style>
</head>
<body>

<div class="container">
    <div class="glass-panel">
        <h2>📊 Trạng thái: <span class="status-text">Chungdacoeim</span></h2>
        <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
            <span>Số dư: <strong id="balance" style="font-size: 18px; color: #4cd964;">0đ</strong></span>
            <span>Hạng: <strong id="rank" style="color: #ff4b2b;">?</strong></span>
        </div>
        <div class="log-box" id="progress">⚡ Chờ lệnh...</div>
    </div>

    <div class="glass-panel">
        <h3>🎮 Bảng điều khiển</h3>
        <div class="btn-grid">
            <button onclick="sendCommand('/uptolink2step')">UpToLink 2 Step</button>
            <button onclick="sendCommand('/uptolink3step')">UpToLink 3 Step</button>
            <button onclick="sendCommand('/spin')">Lượt quay</button>
            <button onclick="sendCommand('/top')">Cập nhật Hạng</button>
            <button style="background: rgba(255,0,0,0.5);" onclick="sendCommand('/withdraw')">💳 Rút tiền</button>
        </div>

        <div class="settings-row">
            <div class="input-group">
                <input type="checkbox" id="autoPpLink" onchange="syncSettings()"> <label>Đa máy (Auto-PPLink)</label>
            </div>
            <div class="input-group">
                <input type="checkbox" id="targetToggle" onchange="syncSettings()"> <label>Bật Mục tiêu NV:</label>
                <input type="number" id="targetTasks" value="50" onchange="syncSettings()">
            </div>
            <div class="input-group">
                <label>Delay(s):</label>
                <input type="number" id="delayInput" value="5" onchange="syncSettings()">
            </div>
        </div>
    </div>

    <div class="glass-panel">
        <h3>🌐 Thiết bị Web đang mở: <span id="devCount" class="status-text">0</span></h3>
        <ul id="deviceList"><li style="border-left-color: gray;">Chưa kết nối...</li></ul>
    </div>
</div>

<script>
    const socket = io();

    socket.on('connect', () => { socket.emit('REGISTER_UI'); });

    socket.on('UPDATE_BALANCE', bal => document.getElementById('balance').innerText = bal + 'đ');
    socket.on('UPDATE_RANK', rank => document.getElementById('rank').innerText = rank);
    socket.on('UPDATE_LOG', msg => document.getElementById('progress').innerText = msg);
    
    socket.on('UPDATE_DEVICES', (devices) => {
        document.getElementById('devCount').innerText = devices.length;
        document.getElementById('deviceList').innerHTML = devices.map(d => 
            `<li><span class="${d.status==='idle'?'badge-idle':'badge-working'}">${d.status==='idle'?'Rảnh':'Bận'}</span> <span>IP: <strong>${d.ip}</strong></span></li>`
        ).join('');
    });

    // --- CẦU NỐI VỚI EXTENSION (WAKE UP EXTENSION BẰNG SỰ KIỆN DOM) ---
    socket.on('OPEN_LINK', (payload) => {
        document.dispatchEvent(new CustomEvent('EXT_OPEN_LINK', { detail: payload }));
    });
    socket.on('FORCE_CLOSE_TABS', (payload) => {
        document.dispatchEvent(new CustomEvent('EXT_FORCE_CLOSE', { detail: payload }));
    });

    // Nhận báo cáo từ Extension gửi về Web UI, đẩy lên Server
    document.addEventListener('WEB_URL_REACHED', (e) => socket.emit('URL_REACHED', e.detail));
    document.addEventListener('WEB_REPORT_ERROR', (e) => socket.emit('REPORT_ERROR', e.detail));

    function sendCommand(cmd) { 
        const target = document.getElementById('targetTasks').value;
        socket.emit('SEND_COMMAND', { command: cmd, target: parseInt(target) }); 
    }

    function syncSettings() {
        const settings = {
            auto: document.getElementById('autoPpLink').checked,
            targetEnabled: document.getElementById('targetToggle').checked,
            delay: parseInt(document.getElementById('delayInput').value) * 1000
        };
        socket.emit('UPDATE_SETTINGS', settings);
        localStorage.setItem('cryptoSettings', JSON.stringify(settings));
        localStorage.setItem('targetVal', document.getElementById('targetTasks').value);
    }

    window.onload = () => {
        const s = JSON.parse(localStorage.getItem('cryptoSettings') || '{"auto":false,"targetEnabled":true,"delay":5000}');
        document.getElementById('autoPpLink').checked = s.auto;
        document.getElementById('targetToggle').checked = s.targetEnabled;
        document.getElementById('delayInput').value = s.delay / 1000;
        document.getElementById('targetTasks').value = localStorage.getItem('targetVal') || 50;
        syncSettings();
    }
</script>
</body>
</html>
